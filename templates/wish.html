<!-- =========================================
MAGICAL BIRTHDAY TREE — CINEMATIC FINAL
========================================= -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Magical Birthday Tree</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#050005;
  font-family:sans-serif;
}

canvas{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  display:block;
}

#photoModal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.92);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
  cursor:pointer;
}

#photoModal.show{
  display:flex;
}

#photoModal img{
  max-width:min(92vw,680px);
  max-height:86vh;
  border-radius:20px;
  border:3px solid #ff8bd5;

  box-shadow:
    0 0 60px rgba(255,105,190,.9),
    0 0 120px rgba(255,105,190,.4);
}

</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div id="photoModal" onclick="this.classList.remove('show')">
  <img id="modalImg">
</div>

<script>

///////////////////////////////////////////////////////////
// CONFIG
///////////////////////////////////////////////////////////

const PHOTOS=[

"https://images.unsplash.com/photo-1517836357463-d25dfeac3438?q=80&w=1200&auto=format&fit=crop",

"https://images.unsplash.com/photo-1526506118085-60ce8714f8c5?q=80&w=1200&auto=format&fit=crop",

"https://images.unsplash.com/photo-1518611012118-696072aa579a?q=80&w=1200&auto=format&fit=crop"

];

const RECIPIENT="BINIT";

const MESSAGE="A little memory just for you";

///////////////////////////////////////////////////////////

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

let W,H;

let ROOT_X,ROOT_Y,TRUNK_L;

let branches=[];
let leaves=[];
let roots=[];

let frame=0;

const MAX_DEPTH=7;

///////////////////////////////////////////////////////////
// HELPERS
///////////////////////////////////////////////////////////

function rand(a,b){
  return a+Math.random()*(b-a);
}

function lerp(a,b,t){
  return a+(b-a)*t;
}

function clamp(v,a,b){
  return Math.max(a,Math.min(b,v));
}

function fs(base){
  return clamp(W*base,14,60);
}

///////////////////////////////////////////////////////////
// RESIZE
///////////////////////////////////////////////////////////

function resize(){

  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;

  ROOT_X=W*0.5;
  ROOT_Y=H*0.86;

  TRUNK_L=Math.min(H*0.19,W*0.18);

  buildTree();
  buildRoots();
}

window.addEventListener("resize",resize);

///////////////////////////////////////////////////////////
// ROUNDED RECT
///////////////////////////////////////////////////////////

function rr(x,y,w,h,r){

  r=Math.min(r,w/2,h/2);

  ctx.beginPath();

  ctx.moveTo(x+r,y);

  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);

  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);

  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);

  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);

  ctx.closePath();
}

///////////////////////////////////////////////////////////
// STARS
///////////////////////////////////////////////////////////

const stars=[];

for(let i=0;i<220;i++){

  stars.push({

    x:rand(0,window.innerWidth),

    y:rand(0,window.innerHeight*0.82),

    r:rand(0.4,2),

    a:rand(0.2,1),

    phase:rand(0,Math.PI*2),

    sp:rand(1,5)
  });
}

function drawStars(){

  for(let s of stars){

    ctx.save();

    ctx.globalAlpha=
      s.a*(0.35+0.65*Math.abs(Math.sin(frame*0.004*s.sp+s.phase)));

    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);

    ctx.fillStyle="#fff";
    ctx.fill();

    ctx.restore();
  }
}

///////////////////////////////////////////////////////////
// MAGIC DUST
///////////////////////////////////////////////////////////

const dust=[];

for(let i=0;i<260;i++){

  dust.push({

    x:rand(0,window.innerWidth),

    y:rand(-window.innerHeight,0),

    vx:rand(-0.2,0.2),

    vy:rand(0.4,1.5),

    r:rand(0.5,2.2),

    hue:rand(310,360),

    a:rand(0.15,0.8)
  });
}

function updateDust(){

  for(let d of dust){

    d.x+=d.vx;
    d.y+=d.vy;

    if(d.y>H){

      d.x=rand(0,W);
      d.y=rand(-80,-10);
    }
  }
}

function drawDust(){

  for(let d of dust){

    ctx.save();

    ctx.globalAlpha=d.a*0.55;

    ctx.beginPath();

    ctx.arc(d.x,d.y,d.r,0,Math.PI*2);

    ctx.fillStyle=`hsl(${d.hue},90%,72%)`;

    ctx.shadowColor=`hsl(${d.hue},90%,72%)`;
    ctx.shadowBlur=5;

    ctx.fill();

    ctx.restore();
  }
}

///////////////////////////////////////////////////////////
// TREE BUILD
///////////////////////////////////////////////////////////

function buildTree(){

  branches=[];
  leaves=[];

  function grow(x,y,angle,len,depth,parentProgress){

    if(depth>MAX_DEPTH||len<6)return;

    const rad=angle*Math.PI/180;

    const x2=x+Math.cos(rad)*len;
    const y2=y-Math.sin(rad)*len;

    const start=0.18+depth*0.06;

    branches.push({

      x1:x,
      y1:y,

      x2:x2,
      y2:y2,

      depth,

      reveal:start,

      progress:0
    });

    if(depth===MAX_DEPTH){

      leaves.push({

        cx:x2,
        cy:y2,

        size:rand(10,18),

        hue:[330,340,350,320][Math.floor(rand(0,4))],

        swayAmp:rand(2,7),

        swaySpeed:rand(0.5,1.1),

        phase:rand(0,Math.PI*2),

        baseAngle:angle,

        glow:rand(0.4,1)
      });

      return;
    }

    let spread=lerp(38,16,depth/MAX_DEPTH);

    let lm=rand(0.68,0.77);

    grow(x2,y2,angle+spread,len*lm,depth+1);
    grow(x2,y2,angle-spread,len*lm,depth+1);

    if(depth<3&&Math.random()>0.35){

      grow(
        x2,
        y2,

        angle+rand(-spread*0.35,spread*0.35),

        len*lm*0.72,

        depth+2
      );
    }
  }

  grow(ROOT_X,ROOT_Y,90,TRUNK_L,0);
}

///////////////////////////////////////////////////////////
// ROOTS
///////////////////////////////////////////////////////////

const rootWords=MESSAGE.split(/\s+/);

function buildRoots(){

  roots=[];

  let baseY=ROOT_Y+H*0.01;

  let spread=Math.min(W*0.42,W*0.07*rootWords.length);

  for(let i=0;i<rootWords.length;i++){

    let side=i%2===0?-1:1;

    let rank=Math.floor(i/2);

    let ex=ROOT_X+side*spread*((rank+1)/4);

    let ey=baseY+H*0.08+rank*H*0.02;

    roots.push({

      word:rootWords[i],

      sx:ROOT_X,
      sy:baseY,

      ex,
      ey,

      cx1:ROOT_X+side*60,
      cy1:baseY+40,

      cx2:ex-side*30,
      cy2:ey-20,

      progress:0
    });
  }
}

function bez(r,t){

  let mt=1-t;

  return{

    x:
      mt*mt*mt*r.sx+
      3*mt*mt*t*r.cx1+
      3*mt*t*t*r.cx2+
      t*t*t*r.ex,

    y:
      mt*mt*mt*r.sy+
      3*mt*mt*t*r.cy1+
      3*mt*t*t*r.cy2+
      t*t*t*r.ey
  };
}

///////////////////////////////////////////////////////////
// HEART
///////////////////////////////////////////////////////////

function heart(x,y,a,s,col,alpha,blur){

  ctx.save();

  ctx.globalAlpha=alpha;

  ctx.translate(x,y);

  ctx.rotate(a*Math.PI/180);

  ctx.beginPath();

  ctx.moveTo(0,-s*0.45);

  ctx.bezierCurveTo(
    s*0.75,-s*1.15,
    s*1.55,s*0.25,
    0,s*0.95
  );

  ctx.bezierCurveTo(
    -s*1.55,s*0.25,
    -s*0.75,-s*1.15,
    0,-s*0.45
  );

  ctx.fillStyle=col;

  ctx.shadowColor=col;
  ctx.shadowBlur=blur;

  ctx.fill();

  ctx.restore();
}

///////////////////////////////////////////////////////////
// ORGANIC MAGIC BEAM
///////////////////////////////////////////////////////////

let beamParticles=[];

function triggerBeam(target){

  beamParticles=[];

  const lf=leaves[target];

  for(let i=0;i<90;i++){

    beamParticles.push({

      t:i/90,

      speed:rand(0.004,0.012),

      size:rand(2,6),

      alpha:rand(0.4,1),

      target
    });
  }
}

function beamPoint(t,target){

  let lf=leaves[target];

  let p0={x:ROOT_X,y:ROOT_Y};
  let p1={x:ROOT_X+rand(-80,80),y:ROOT_Y-H*0.25};
  let p2={x:lf.cx+rand(-50,50),y:lf.cy+H*0.1};
  let p3={x:lf.cx,y:lf.cy};

  let mt=1-t;

  return{

    x:
      mt*mt*mt*p0.x+
      3*mt*mt*t*p1.x+
      3*mt*t*t*p2.x+
      t*t*t*p3.x,

    y:
      mt*mt*mt*p0.y+
      3*mt*mt*t*p1.y+
      3*mt*t*t*p2.y+
      t*t*t*p3.y
  };
}

function updateBeam(){

  for(let p of beamParticles){

    p.t+=p.speed;
  }

  beamParticles=beamParticles.filter(p=>p.t<1.02);
}

function drawBeam(){

  for(let p of beamParticles){

    let pt=beamPoint(p.t,p.target);

    ctx.save();

    ctx.globalAlpha=(1-p.t)*p.alpha;

    ctx.beginPath();

    ctx.arc(pt.x,pt.y,p.size,0,Math.PI*2);

    ctx.fillStyle="#fff";

    ctx.shadowColor="#ff9ce0";
    ctx.shadowBlur=28;

    ctx.fill();

    ctx.restore();
  }
}

///////////////////////////////////////////////////////////
// BURST PARTICLES
///////////////////////////////////////////////////////////

const bursts=[];

function spawnBurst(x,y){

  for(let i=0;i<36;i++){

    let a=rand(0,Math.PI*2);

    let sp=rand(1.5,5);

    bursts.push({

      x,y,

      vx:Math.cos(a)*sp,
      vy:Math.sin(a)*sp,

      size:rand(2,6),

      hue:rand(320,360),

      life:1
    });
  }
}

function updateBursts(){

  for(let i=bursts.length-1;i>=0;i--){

    let b=bursts[i];

    b.x+=b.vx;
    b.y+=b.vy;

    b.life-=0.024;

    if(b.life<=0){

      bursts.splice(i,1);
    }
  }
}

function drawBursts(){

  for(let b of bursts){

    ctx.save();

    ctx.globalAlpha=b.life;

    ctx.beginPath();

    ctx.arc(b.x,b.y,b.size,0,Math.PI*2);

    ctx.fillStyle=`hsl(${b.hue},90%,72%)`;

    ctx.shadowColor=`hsl(${b.hue},90%,72%)`;
    ctx.shadowBlur=14;

    ctx.fill();

    ctx.restore();
  }
}

///////////////////////////////////////////////////////////
// PHOTO SYSTEM
///////////////////////////////////////////////////////////

let photoIndex=0;

let activeLeaf=-1;

let activePhoto=null;

let activeAlpha=0;

let photoScale=0.92;

let showTimer=0;

function nextPhoto(){

  let idx=photoIndex;

  photoIndex=(photoIndex+1)%PHOTOS.length;

  return idx;
}

function schedulePhoto(){

  activeLeaf=Math.floor(rand(0,leaves.length));

  triggerBeam(activeLeaf);

  setTimeout(()=>{

    let img=new Image();

    img.src=PHOTOS[nextPhoto()];

    img.onload=function(){

      activePhoto=img;

      activeAlpha=0;

      photoScale=0.92;

      showTimer=0;

      spawnBurst(
        leaves[activeLeaf].cx,
        leaves[activeLeaf].cy
      );
    };

  },1800);
}

///////////////////////////////////////////////////////////
// MAIN ANIMATION
///////////////////////////////////////////////////////////

function animate(){

  requestAnimationFrame(animate);

  frame++;

  ctx.fillStyle="#050005";
  ctx.fillRect(0,0,W,H);

  //////////////////////////////////////
  // BACKGROUND
  //////////////////////////////////////

  let glow=ctx.createRadialGradient(
    W/2,H*0.5,0,
    W/2,H*0.5,W*0.65
  );

  glow.addColorStop(0,"rgba(80,0,55,.35)");
  glow.addColorStop(1,"rgba(0,0,0,0)");

  ctx.fillStyle=glow;
  ctx.fillRect(0,0,W,H);

  drawStars();

  updateDust();
  drawDust();

  //////////////////////////////////////
  // TITLE
  //////////////////////////////////////

  ctx.save();

  ctx.textAlign="center";

  ctx.font="bold "+fs(0.04)+"px Cinzel";

  ctx.fillStyle="#f0c060";

  ctx.shadowColor="#d4a853";

  ctx.shadowBlur=28+Math.sin(frame*0.03)*6;

  ctx.fillText(
    "✦ HAPPY BIRTHDAY "+RECIPIENT+" ✦",
    W/2,
    H*0.072
  );

  ctx.font="italic "+fs(0.022)+'px "Dancing Script"';

  ctx.fillStyle="#ff7cc7";

  ctx.shadowColor="#ff4fb0";

  ctx.shadowBlur=16;

  ctx.fillText(
    "A little memory, just for you ❤",
    W/2,
    H*0.126
  );

  ctx.restore();

  //////////////////////////////////////
  // ROOTS
  //////////////////////////////////////

  for(let r of roots){

    r.progress=Math.min(1,r.progress+0.004);

    ctx.save();

    ctx.beginPath();

    ctx.moveTo(r.sx,r.sy);

    for(let i=1;i<=50;i++){

      let pt=bez(r,(i/50)*r.progress);

      ctx.lineTo(pt.x,pt.y);
    }

    ctx.strokeStyle="#8a4e28";

    ctx.lineWidth=2.2;

    ctx.lineCap="round";

    ctx.stroke();

    ctx.restore();

    if(r.progress>0.9){

      let pt=bez(r,1);

      ctx.save();

      ctx.font='italic '+fs(0.018)+'px "Dancing Script"';

      ctx.fillStyle="#f5c842";

      ctx.shadowColor="#f5c842";

      // PULSE
      ctx.shadowBlur=8+Math.sin(frame*0.03)*4;

      ctx.textAlign="center";

      ctx.fillText(r.word,pt.x,pt.y+5);

      ctx.restore();
    }
  }

  //////////////////////////////////////
  // PROGRESSIVE BRANCH GROWTH
  //////////////////////////////////////

  for(let b of branches){

    b.progress=Math.min(1,b.progress+0.006);

    let x=lerp(b.x1,b.x2,b.progress);
    let y=lerp(b.y1,b.y2,b.progress);

    ctx.save();

    let gg=ctx.createLinearGradient(
      b.x1,b.y1,b.x2,b.y2
    );

    gg.addColorStop(0,"#4a2008");
    gg.addColorStop(1,"#8c5020");

    ctx.beginPath();

    ctx.moveTo(b.x1,b.y1);
    ctx.lineTo(x,y);

    ctx.strokeStyle=gg;

    ctx.lineWidth=Math.max(1,(8-b.depth)*1.8);

    ctx.lineCap="round";

    ctx.stroke();

    ctx.restore();
  }

  //////////////////////////////////////
  // LEAVES
  //////////////////////////////////////

  for(let i=0;i<leaves.length;i++){

    let lf=leaves[i];

    let sway=
      Math.sin(frame*0.03*lf.swaySpeed+lf.phase)
      *lf.swayAmp;

    let ox=
      Math.sin(frame*0.02+lf.phase)
      *lf.swayAmp*0.3;

    let oy=
      Math.cos(frame*0.02+lf.phase)
      *lf.swayAmp*0.15;

    let active=i===activeLeaf;

    // DEPTH EFFECT
    let dist=Math.abs(i-activeLeaf);

    let alpha=
      active
      ?1
      :clamp(1-dist*0.012,0.35,0.8);

    let blur=
      active
      ?24
      :10;

    let light=
      active
      ?68
      :48+Math.sin(frame*0.02+lf.phase)*5;

    heart(

      lf.cx+ox,
      lf.cy+oy,

      lf.baseAngle-90+sway,

      lf.size,

      `hsl(${lf.hue},${active?90:70}%,${light}%)`,

      alpha,

      blur
    );

    //////////////////////////////////////
    // PHOTO CARD
    //////////////////////////////////////

    if(active&&activePhoto){

      showTimer++;

      activeAlpha=Math.min(1,activeAlpha+0.035);

      if(showTimer>220){

        activeAlpha-=0.028;
      }

      if(showTimer>260){

        activePhoto=null;

        setTimeout(schedulePhoto,1200);
      }

      photoScale=lerp(photoScale,1,0.08);

      let pw=clamp(Math.min(W,H)*0.25,100,260);

      let scaleW=pw*photoScale;

      let ppx=lf.cx-scaleW/2;

      let ppy=lf.cy-scaleW-lf.size*2-18;

      if(ppx<12)ppx=12;

      if(ppx+scaleW>W-12){

        ppx=W-scaleW-12;
      }

      if(ppy<12){

        ppy=lf.cy+lf.size*2+20;
      }

      ppy+=Math.sin(frame*0.05)*4;

      ////////////////////////////////////
      // GLOW
      ////////////////////////////////////

      ctx.save();

      ctx.globalAlpha=activeAlpha*0.5;

      ctx.fillStyle="#ff5fc4";

      ctx.shadowColor="#ff5fc4";

      ctx.shadowBlur=40;

      rr(ppx-6,ppy-6,scaleW+12,scaleW+12,20);

      ctx.fill();

      ctx.restore();

      ////////////////////////////////////
      // IMAGE
      ////////////////////////////////////

      ctx.save();

      ctx.globalAlpha=activeAlpha;

      rr(ppx,ppy,scaleW,scaleW,16);

      ctx.clip();

      ctx.drawImage(
        activePhoto,
        ppx,
        ppy,
        scaleW,
        scaleW
      );

      ctx.restore();

      ////////////////////////////////////
      // BORDER
      ////////////////////////////////////

      ctx.save();

      ctx.globalAlpha=activeAlpha;

      rr(ppx,ppy,scaleW,scaleW,16);

      ctx.strokeStyle="#ffc3e8";

      ctx.lineWidth=2.5;

      ctx.stroke();

      ctx.restore();

      ////////////////////////////////////
      // CONNECTOR
      ////////////////////////////////////

      ctx.save();

      ctx.globalAlpha=activeAlpha*0.3;

      ctx.beginPath();

      ctx.moveTo(lf.cx,lf.cy);

      ctx.lineTo(ppx+scaleW/2,ppy+scaleW);

      ctx.strokeStyle="#ffb6e4";

      ctx.lineWidth=1.5;

      ctx.setLineDash([4,5]);

      ctx.stroke();

      // IMPORTANT RESET
      ctx.setLineDash([]);

      ctx.restore();
    }
  }

  updateBeam();
  drawBeam();

  updateBursts();
  drawBursts();
}

///////////////////////////////////////////////////////////
// START
///////////////////////////////////////////////////////////

resize();

animate();

setTimeout(schedulePhoto,3000);

///////////////////////////////////////////////////////////
// MODAL
///////////////////////////////////////////////////////////

canvas.addEventListener("click",function(e){

  let mx=e.clientX;
  let my=e.clientY;

  for(let lf of leaves){

    if(
      Math.sqrt(
        (mx-lf.cx)**2+
        (my-lf.cy)**2
      )<lf.size*3
    ){

      document.getElementById("modalImg").src=
        activePhoto?.src||PHOTOS[0];

      document
        .getElementById("photoModal")
        .classList.add("show");

      break;
    }
  }
});

</script>

</body>
</html>
