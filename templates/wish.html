<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Magic Birthday Tree</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#050005;}
canvas{position:fixed;inset:0;width:100%;height:100%;}
#photoModal{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.92);z-index:999;
  align-items:center;justify-content:center;cursor:pointer;
}
#photoModal.show{display:flex;}
#photoModal img{
  max-width:min(90vw,650px);max-height:85vh;
  border-radius:18px;border:3px solid #ff69c9;
  box-shadow:0 0 50px rgba(255,105,201,.8),0 0 100px rgba(255,105,201,.3);
  animation:popIn .45s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn{from{transform:scale(.3) rotate(-6deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="photoModal" onclick="this.classList.remove('show')">
  <img id="modalImg">
</div>
<script>
(function(){
try{

// --- SYNC WITH APP.PY ---
var PHOTOS    = {{ photos_json|safe }};
var MESSAGE   = {{ message|tojson }};
var RECIPIENT = {{ recipient|tojson }};

var canvas = document.getElementById("canvas");
var ctx    = canvas.getContext("2d");
var W,H,ROOT_X,ROOT_Y,TRUNK_L;
var branches=[],leaves=[],roots=[];
var frame=0, buildProgress=0;
var MAX_DEPTH=8;

function rand(a,b){return a+Math.random()*(b-a);}
function lerp(a,b,t){return a+(b-a)*t;}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function fs(frac){ return clamp(Math.min(W,H)*frac,11,72); }

function rr(x,y,w,h,r){
  r=Math.min(r,w/2,h/2);
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function resize(){
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
  ROOT_X=W*0.5;
  ROOT_Y=H*0.88;
  TRUNK_L=clamp(Math.min(H*0.20,W*0.18),60,240);
  buildTree();
  buildRoots();
  makeStars();
  makeDust();
  makePetals();
}
window.addEventListener("resize",resize);

// --- BACKGROUNDS ---
var stars=[];
function makeStars(){
  stars=[];
  var count=clamp(Math.floor(W*H/8000),80,220);
  for(var i=0;i<count;i++) stars.push({
    x:rand(0,W), y:rand(0,H*0.82),
    r:rand(0.4,1.8), a:rand(0.3,1), ph:rand(0,Math.PI*2), sp:rand(1,4)
  });
}
function drawStars(){
  for(var i=0;i<stars.length;i++){
    var s=stars[i];
    ctx.save();
    ctx.globalAlpha=s.a*(0.4+0.6*Math.abs(Math.sin(frame*0.006*s.sp+s.ph)));
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle="#fff";ctx.fill();ctx.restore();
  }
}

var dust=[];
function makeDust(){
  dust=[];
  var count=clamp(Math.floor(W*H/6000),80,260);
  for(var i=0;i<count;i++) dust.push({
    x:rand(0,W), y:rand(-H,0),
    vx:rand(-0.2,0.2), vy:rand(0.3,1.2),
    r:rand(0.5,2), hue:rand(300,360), a:rand(0.2,0.8)
  });
}
function updateDust(){
  for(var i=0;i<dust.length;i++){
    var d=dust[i]; d.x+=d.vx; d.y+=d.vy;
    if(d.y>H){d.x=rand(0,W);d.y=rand(-100,-10);}
  }
}
function drawDust(){
  for(var i=0;i<dust.length;i++){
    var d=dust[i];
    ctx.save();
    ctx.globalAlpha=d.a*0.5*clamp(buildProgress*4,0,1);
    ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
    var col="hsl("+d.hue+",80%,70%)";
    ctx.fillStyle=col;ctx.shadowColor=col;ctx.shadowBlur=4;
    ctx.fill();ctx.restore();
  }
}

var petals=[];
function newPetal(init){
  return{
    x:rand(0,W), y:init?rand(-H,0):rand(-30,-5),
    vx:rand(-0.4,0.4), vy:rand(0.35,1.1),
    rot:rand(0,Math.PI*2), rs:rand(-0.03,0.03),
    size:rand(3,8), hue:rand(310,360), a:rand(0.2,0.65)
  };
}
function makePetals(){
  petals=[];
  var count=clamp(Math.floor(W*H/28000),18,55);
  for(var i=0;i<count;i++) petals.push(newPetal(true));
}
function updatePetals(){
  for(var i=0;i<petals.length;i++){
    var p=petals[i];
    p.x+=p.vx+Math.sin(p.y*0.01)*0.3; p.y+=p.vy; p.rot+=p.rs;
    if(p.y>H+20) petals[i]=newPetal(false);
  }
}
function drawPetals(){
  var ta=clamp((buildProgress-0.05)/0.2,0,1);
  for(var i=0;i<petals.length;i++){
    var p=petals[i];
    ctx.save();ctx.globalAlpha=p.a*ta;
    ctx.translate(p.x,p.y);ctx.rotate(p.rot);
    var s=p.size;
    ctx.beginPath();ctx.moveTo(0,-s*0.4);
    ctx.bezierCurveTo(s*0.6,-s,s*1.2,s*0.2,0,s*0.9);
    ctx.bezierCurveTo(-s*1.2,s*0.2,-s*0.6,-s,0,-s*0.4);
    ctx.fillStyle="hsl("+p.hue+",90%,75%)";
    ctx.shadowColor="hsl("+p.hue+",90%,75%)";ctx.shadowBlur=6;
    ctx.fill();ctx.restore();
  }
}

// --- TREE LOGIC ---
function buildTree(){
  branches=[]; leaves=[];
  var tipNodes=[];
  function grow(x,y,angle,len,depth){
    if(depth>MAX_DEPTH||len<4) return;
    var rad=angle*Math.PI/180;
    var x2=x+Math.cos(rad)*len, y2=y-Math.sin(rad)*len;
    var ph=depth/(MAX_DEPTH+1);
    var rs=0.18+ph*0.28;
    var re=rs+0.18;
    branches.push({x1:x,y1:y,x2:x2,y2:y2,depth:depth,rs:rs,re:re,ax:Math.cos(rad),ay:-Math.sin(rad),len:len});
    if(depth===MAX_DEPTH){
      tipNodes.push({cx:x2,cy:y2,angle:angle,depth:depth});
      return;
    }
    var spread=lerp(42,14,depth/MAX_DEPTH);
    var lm=lerp(0.72,0.80,depth/MAX_DEPTH);
    grow(x2,y2,angle+spread,len*lm,depth+1);
    grow(x2,y2,angle-spread,len*lm,depth+1);
    if(depth<4&&Math.random()>0.45) grow(x2,y2,angle+rand(-spread*0.3,spread*0.3),len*lm*0.68,depth+2);
  }
  grow(ROOT_X,ROOT_Y,90,TRUNK_L,0);
  var baseLeafSize=fs(0.018);
  tipNodes.forEach(function(t){
    leaves.push({cx:t.cx, cy:t.cy, size:baseLeafSize*rand(0.75,1.35), hue:[330,340,350,320,308,338][Math.floor(rand(0,6))], phase:rand(0,Math.PI*2), swayAmp:rand(2,9), swaySpeed:rand(0.5,1.3), baseAngle:t.angle, rs:0.64, re:0.72 });
  });
}

var rootWords=MESSAGE.trim()?MESSAGE.trim().split(/\s+/).slice(0,20):[];
function buildRoots(){
  roots=[];
  if(!rootWords.length) return;
  var n=rootWords.length;
  var baseY=ROOT_Y+clamp(H*0.010,6,16);
  var maxSpread=W*0.36;
  for(var i=0;i<n;i++){
    var norm=n===1?0:(i/(n-1))*2-1;
    var ex=ROOT_X+norm*maxSpread;
    var depthFactor=Math.abs(norm);
    var ey=baseY+clamp(H*0.045,16,70)+depthFactor*clamp(H*0.040,14,56);
    var cx1=ROOT_X+norm*clamp(W*0.05,16,60);
    var cy1=baseY+clamp(H*0.025,8,36);
    var cx2=ex-norm*clamp(W*0.03,10,40);
    var cy2=ey-clamp(H*0.018,6,24);
    roots.push({word:rootWords[i],sx:ROOT_X, sy:baseY,ex:ex, ey:ey,cx1:cx1, cy1:cy1,cx2:cx2, cy2:cy2,progress:0,pulseOffset:rand(0,Math.PI*2)});
  }
}

function bez(r,t){
  var mt=1-t;
  return{ x:mt*mt*mt*r.sx+3*mt*mt*t*r.cx1+3*mt*t*t*r.cx2+t*t*t*r.ex, y:mt*mt*mt*r.sy+3*mt*mt*t*r.cy1+3*mt*t*t*r.cy2+t*t*t*r.ey };
}

function heart(x,y,a,s,c,alpha,glowSize){
  ctx.save();ctx.globalAlpha=clamp(alpha,0,1);
  ctx.translate(x,y);ctx.rotate(a*Math.PI/180);
  ctx.beginPath();ctx.moveTo(0,-s*0.45);
  ctx.bezierCurveTo(s*0.75,-s*1.15,s*1.55,s*0.25,0,s*0.95);
  ctx.bezierCurveTo(-s*1.55,s*0.25,-s*0.75,-s*1.15,0,-s*0.45);
  ctx.fillStyle=c;ctx.shadowColor=c;ctx.shadowBlur=glowSize||12;
  ctx.fill();ctx.restore();
}

// --- PHOTO SYSTEM ---
var beam=null, beamParticles=[], photoQueue=[], photoIndex=0, activeLeaf=-1, currentImg=null, showTimer=0, photoPhase="idle", activeAlpha=0, firstScheduled=false, pendingTimeout=null;
var frameX=0, frameY=0, frameW=0;
var SHOW_DUR=120, FADE_IN=30, FADE_OUT=30;

function shuffleQueue(){ photoQueue=PHOTOS.map((_,i)=>i).sort(()=>Math.random()-0.5); }
shuffleQueue();

function triggerBeam(leafIdx,cb){
  var lf=leaves[leafIdx];
  beam={t:0, idx:leafIdx, cb:cb, p0:{x:ROOT_X, y:ROOT_Y}, p1:{x:ROOT_X, y:ROOT_Y-TRUNK_L}, p2:{x:lf.cx, y:lf.cy-50}, p3:{x:lf.cx, y:lf.cy}};
}

function cubicBez(p0,p1,p2,p3,t){
  var mt=1-t;
  return{ x:mt*mt*mt*p0.x+3*mt*mt*t*p1.x+3*mt*t*t*p2.x+t*t*t*p3.x, y:mt*mt*mt*p0.y+3*mt*mt*t*p1.y+3*mt*t*t*p2.y+t*t*t*p3.y };
}

function loadNextPhoto(){
  if(!PHOTOS.length||!leaves.length) return;
  activeLeaf=Math.floor(rand(0, leaves.length));
  var lf=leaves[activeLeaf];
  frameW=clamp(Math.min(W,H)*0.25,100,220);
  frameX=clamp(lf.cx-frameW/2, 20, W-frameW-20);
  frameY=clamp(lf.cy+20, 20, H-frameW-20);
  if(photoIndex>=photoQueue.length){photoIndex=0;shuffleQueue();}
  var pIdx=photoQueue[photoIndex++];
  triggerBeam(activeLeaf, function(){
    var img=new Image();
    img.src=PHOTOS[pIdx];
    img.onload=function(){ currentImg=img; photoPhase="fadein"; showTimer=0; };
  });
}

function advancePhotoState(){
  if(photoPhase==="idle") return;
  if(photoPhase==="fadein"){
    showTimer++; activeAlpha=Math.min(1,showTimer/FADE_IN);
    if(showTimer>=FADE_IN){showTimer=0;photoPhase="hold";}
  }else if(photoPhase==="hold"){
    showTimer++; if(showTimer>=SHOW_DUR){showTimer=0;photoPhase="fadeout";}
  }else if(photoPhase==="fadeout"){
    showTimer++; activeAlpha=Math.max(0,1-showTimer/FADE_OUT);
    if(showTimer>=FADE_OUT){ activeAlpha=0;currentImg=null;photoPhase="idle";setTimeout(loadNextPhoto,1000); }
  }
}

function animate(){
  requestAnimationFrame(animate);
  frame++;
  buildProgress=clamp(buildProgress+0.0015,0,1);
  var bp=buildProgress;

  ctx.fillStyle="#050005";ctx.fillRect(0,0,W,H);
  var g=ctx.createRadialGradient(W/2,H*0.5,0,W/2,H*0.5,W*0.65);
  g.addColorStop(0,"rgba(65,0,42,0.45)");g.addColorStop(1,"rgba(0,0,0,0)");
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);

  drawStars();
  updateDust();drawDust();
  updatePetals();drawPetals();

  // Header
  if(bp > 0.1){
    ctx.save();ctx.textAlign="center";
    ctx.globalAlpha=clamp((bp-0.1)*5,0,1);
    ctx.fillStyle="#f0c060";ctx.font="bold "+fs(0.045)+"px Cinzel";
    ctx.fillText("✦ HAPPY BIRTHDAY ✦", W/2, H*0.08);
    ctx.fillStyle="#ffd0e8";ctx.font="bold "+fs(0.035)+"px Cinzel";
    ctx.fillText(RECIPIENT, W/2, H*0.14);
    ctx.restore();
  }

  // Roots
  roots.forEach((r,i)=>{
    var rs=0.18+i*0.02;
    var lp=clamp((bp-rs)/0.2,0,1);
    if(lp>0){
      ctx.beginPath();ctx.moveTo(r.sx,r.sy);
      for(var s=1;s<=20;s++){ var pt=bez(r,(s/20)*lp); ctx.lineTo(pt.x,pt.y); }
      ctx.strokeStyle="#8a4e28";ctx.lineWidth=2;ctx.stroke();
      if(lp>0.9){
          ctx.save();ctx.globalAlpha=(lp-0.9)*10;
          ctx.fillStyle="#f5c842";ctx.font='italic '+fs(0.022)+'px "Dancing Script"';
          var ep=bez(r,1);ctx.fillText(r.word,ep.x,ep.y+15);ctx.restore();
      }
    }
  });

  // Branches
  branches.forEach(b => {
    var ba=clamp((bp-b.rs)/(b.re-b.rs),0,1);
    if(ba>0){
      ctx.beginPath();ctx.moveTo(b.x1,b.y1);
      ctx.lineTo(b.x1+b.ax*b.len*ba, b.y1+b.ay*b.len*ba);
      ctx.strokeStyle="#6e3810";ctx.lineWidth=Math.max(1,(8-b.depth)*1.5);ctx.stroke();
    }
  });

  // Leaves
  leaves.forEach((lf,i) => {
    var la=clamp((bp-lf.rs)/(lf.re-lf.rs),0,1);
    if(la>0){
      var sw=Math.sin(frame*0.03+lf.phase)*5;
      heart(lf.cx,lf.cy,lf.baseAngle-90+sw,lf.size,"hsl("+lf.hue+",80%,50%)",la,i===activeLeaf?25:5);
    }
  });

  advancePhotoState();
  if(currentImg && activeAlpha>0){
    ctx.save();ctx.globalAlpha=activeAlpha;
    var py=frameY+Math.sin(frame*0.05)*5;
    rr(frameX,py,frameW,frameW,12);ctx.clip();
    ctx.drawImage(currentImg,frameX,py,frameW,frameW);
    ctx.restore();
  }

  if(beam){
    beam.t+=0.05; var p=cubicBez(beam.p0,beam.p1,beam.p2,beam.p3,beam.t);
    ctx.fillStyle="#fff";ctx.beginPath();ctx.arc(p.x,p.y,5,0,Math.PI*2);ctx.fill();
    if(beam.t>=1){beam.cb();beam=null;}
  }

  if(!firstScheduled && bp > 0.8 && PHOTOS.length > 0){ firstScheduled=true; setTimeout(loadNextPhoto,1000); }
}

resize();
animate();

// Click modal
canvas.addEventListener("click",function(e){
  if(!currentImg) return;
  document.getElementById("modalImg").src=currentImg.src;
  document.getElementById("photoModal").classList.add("show");
});

}catch(err){ console.error(err); }
})();
</script>
</body>
</html>
